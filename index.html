<script>
(function() {
    // ---------- DOM refs ----------
    const nationalInput = document.getElementById('nationalCode');
    const noteContent = document.getElementById('noteContent');
    const statusMsg = document.getElementById('statusMessage');
    const noteMeta = document.getElementById('noteMeta');
    const persianDateDisplay = document.getElementById('persianDateDisplay');

    const loadBtn = document.getElementById('loadBtn');
    const saveBtn = document.getElementById('saveBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const clearEditorBtn = document.getElementById('clearEditorBtn');

    // ---------- storage ----------
    const STORAGE_KEY = 'patient_notes';

    function getAllNotes() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : {};
        } catch (_) { return {}; }
    }

    function saveAllNotes(notes) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function isValidNationalId(code) {
        return /^\d{10}$/.test(code);
    }

    function sanitizeId(code) {
        return code.replace(/\D/g, '').slice(0, 10);
    }

    // ---------- تبدیل اعداد انگلیسی به فارسی ----------
    function toPersianNum(num) {
        const persianDigits = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
        return num.toString().replace(/\d/g, d => persianDigits[d]);
    }

    // ---------- PERSIAN DATE CONVERTER (الگوریتم استاندارد و بی‌نقص jalaali-js) ----------
    function gregorianToJalali(gy, gm, gd) {
        var g_d_m, jy, jm, jd, gy2, days;
        g_d_m = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334];
        gy2 = (gm > 2) ? (gy + 1) : gy;
        days = 355666 + (365 * gy) + (parseInt((gy2 + 3) / 4)) - (parseInt((gy2 + 99) / 100)) + (parseInt((gy2 + 399) / 400)) + gd + g_d_m[gm - 1];
        jy = -1595 + (33 * parseInt(days / 12053));
        days %= 12053;
        jy += 4 * parseInt(days / 1461);
        days %= 1461;
        if(days > 365) {
            jy += parseInt((days - 1) / 365);
            days = (days - 1) % 365;
        }
        if(days < 186) {
            jm = 1 + parseInt(days / 31);
            jd = 1 + (days % 31);
        } else {
            jm = 7 + parseInt((days - 186) / 30);
            jd = 1 + ((days - 186) % 30);
        }
        return { year: jy, month: jm, day: jd };
    }

    function getPersianDate() {
        const now = new Date();
        
        // رفع باگ مهم: اجبار به استفاده از منطقه زمانی تهران
        const options = { timeZone: 'Asia/Tehran' };
        const tehranString = now.toLocaleString('en-US', options);
        const tehranDate = new Date(tehranString);

        const j = gregorianToJalali(tehranDate.getFullYear(), tehranDate.getMonth() + 1, tehranDate.getDate());
        
        const monthNames = ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور',
                           'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'];
                           
        const pYear = toPersianNum(j.year);
        const pDay = toPersianNum(j.day);
        const monthName = monthNames[j.month - 1];

        return `${pDay} ${monthName} ${pYear}`;
    }

    // ---------- Update Persian date display ----------
    function updatePersianDateDisplay() {
        try {
            const dateStr = getPersianDate();
            persianDateDisplay.innerHTML = `<span>${dateStr}</span>`;
        } catch (e) {
            persianDateDisplay.innerHTML = '<span style="color:red;">Error</span>';
            console.error('Date error:', e);
        }
    }

    // ---------- load note ----------
    function loadNoteById(code) {
        if (!isValidNationalId(code)) {
            statusMsg.textContent = '⚠️ National ID must be exactly 10 digits.';
            noteMeta.textContent = '❗ Invalid';
            noteContent.value = '';
            return false;
        }
        const all = getAllNotes();
        const text = all[code] || '';
        noteContent.value = text;
        if (text) {
            statusMsg.textContent = `✅ Note loaded for ID ${code}.`;
            noteMeta.textContent = `📄 ${text.length} chars`;
        } else {
            statusMsg.textContent = `📭 No note found for ID ${code}. (You can write & save)`;
            noteMeta.textContent = '📭 Empty';
        }
        return true;
    }

    // ---------- save note ----------
    function saveCurrentNote() {
        const raw = nationalInput.value.trim();
        const code = sanitizeId(raw);
        if (!isValidNationalId(code)) {
            statusMsg.textContent = '⚠️ Enter a valid 10‑digit National ID to save.';
            return false;
        }
        const text = noteContent.value;
        const all = getAllNotes();
        all[code] = text;
        saveAllNotes(all);
        statusMsg.textContent = `💾 Note saved for ID ${code} (${text.length} chars).`;
        noteMeta.textContent = `💾 ${text.length} chars`;
        return true;
    }

    // ---------- DOWNLOAD: text file with Persian date + ID + note ----------
    function downloadWithPersianDate() {
        const raw = nationalInput.value.trim();
        const code = sanitizeId(raw);
        if (!isValidNationalId(code)) {
            statusMsg.textContent = '⚠️ Enter a valid 10‑digit ID to download.';
            return;
        }
        const noteText = noteContent.value || '(empty note)';
        const persianDate = getPersianDate();
        
        // در نام فایل از تاریخ فارسی استفاده نمی‌کنیم چون ممکنه در بعضی سیستم‌ها مشکل ایجاد کنه، فقط در محتوا میذاریم
        const content = 
`========================================
PATIENT NOTE
========================================
National ID    : ${code}
Persian Date   : ${persianDate}
----------------------------------------
NOTE:
 ${noteText}
========================================
`;
        try {
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `note_${code}.txt`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(url), 100);
            statusMsg.textContent = `✅ Downloaded! ID: ${code} | Date: ${persianDate}`;
        } catch (error) {
            statusMsg.textContent = `❌ Download error: ${error.message}`;
            console.error('Download error:', error);
        }
    }

    // ---------- event listeners ----------
    loadBtn.addEventListener('click', function() {
        const raw = nationalInput.value.trim();
        const code = sanitizeId(raw);
        if (!code) {
            statusMsg.textContent = '⚠️ Please enter a National ID.';
            noteMeta.textContent = '❗ Empty';
            noteContent.value = '';
            return;
        }
        nationalInput.value = code;
        loadNoteById(code);
    });

    saveBtn.addEventListener('click', saveCurrentNote);
    downloadBtn.addEventListener('click', downloadWithPersianDate);

    clearBtn.addEventListener('click', function() {
        const raw = nationalInput.value.trim();
        const code = sanitizeId(raw);
        if (!isValidNationalId(code)) {
            statusMsg.textContent = '⚠️ Enter a valid ID to delete the note.';
            return;
        }
        const all = getAllNotes();
        if (all.hasOwnProperty(code)) {
            delete all[code];
            saveAllNotes(all);
            noteContent.value = '';
            statusMsg.textContent = `🗑️ Note for ID ${code} deleted.`;
            noteMeta.textContent = '🗑️ Deleted';
        } else {
            statusMsg.textContent = `❌ No note exists for ID ${code}.`;
            noteMeta.textContent = '❗ Not found';
            noteContent.value = '';
        }
    });

    clearEditorBtn.addEventListener('click', function() {
        noteContent.value = '';
        statusMsg.textContent = '🧹 Editor cleared (click «Save» to persist).';
        const raw = nationalInput.value.trim();
        const code = sanitizeId(raw);
        if (isValidNationalId(code)) {
            noteMeta.textContent = '📝 empty (edited)';
        } else {
            noteMeta.textContent = '📝 empty';
        }
    });

    nationalInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            loadBtn.click();
        }
    });

    noteContent.addEventListener('input', function() {
        const raw = nationalInput.value.trim();
        const code = sanitizeId(raw);
        if (isValidNationalId(code)) {
            const len = noteContent.value.length;
            noteMeta.textContent = `✏️ ${len} chars (editing)`;
            statusMsg.textContent = `✏️ Editing note for ID ${code} — don't forget to save.`;
        } else {
            noteMeta.textContent = `✏️ ${noteContent.value.length} chars`;
        }
    });

    // ---------- initial ----------
    updatePersianDateDisplay();
    setInterval(updatePersianDateDisplay, 60000);

    statusMsg.textContent = '📌 Enter an ID and press «Load»';
    noteMeta.textContent = '📭 Waiting for ID';
})();
</script>
